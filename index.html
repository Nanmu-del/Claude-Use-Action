<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>个人音乐播放器</title>
  <link rel="stylesheet" href="style.css">
  </head>
<body>
  <div class="bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <button id="btnSettings" class="settings-toggle" title="自定义设置">⚙️</button>

  <div class="player">
    <h1>个人音乐播放器</h1>

    <div class="stage">
      <div class="disc" id="disc">
        <div class="disc-center"></div>
      </div>
      <canvas id="visualizer" class="visualizer"></canvas>
    </div>

    <div class="controls-top">
      <input id="fileInput" type="file" accept="audio/*" multiple />
      <button id="btnClear">清空列表</button>
    </div>

    <div class="playlist" id="playlist"></div>

    <div class="controls">
      <button id="prev" title="上一首">⏮</button>
      <button id="play" title="播放/暂停">▶️</button>
      <button id="next" title="下一首">⏭</button>
      <div class="time"><span id="current">0:00</span> / <span id="duration">0:00</span></div>
    </div>

    <input id="progress" type="range" min="0" max="100" value="0">

    <div class="bottom">
      <label>音量 <input id="volume" type="range" min="0" max="1" step="0.01" value="1"></label>
      <label><input id="shuffle" type="checkbox"> 随机</label>
      <label><input id="repeat" type="checkbox"> 循环</label>
    </div>

    <audio id="audio"></audio>
  </div>

  <!-- 自定义设置面板 -->
  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h2>🎨 自定义</h2>
      <button id="btnCloseSettings" class="close-btn">✕</button>
    </div>

    <div class="setting-group">
      <label class="setting-label">背景图片</label>
      <div class="bg-presets" id="bgPresets"></div>
      <button id="btnCustomBg" class="setting-btn">上传本地图片</button>
      <input id="bgFileInput" type="file" accept="image/*" hidden />
      <input id="bgUrlInput" type="text" class="setting-input" placeholder="或粘贴图片链接 URL，回车应用" />
    </div>

    <div class="setting-group">
      <label class="setting-label">主题强调色</label>
      <div class="theme-presets" id="themePresets"></div>
    </div>

    <div class="setting-group">
      <label class="setting-label">背景模糊 <span id="blurVal">24</span>px</label>
      <input id="blurRange" type="range" min="0" max="40" value="24" class="setting-range" />
    </div>

    <div class="setting-group">
      <label class="setting-label">界面透明度 <span id="opacityVal">7</span>%</label>
      <input id="opacityRange" type="range" min="2" max="30" value="7" class="setting-range" />
    </div>

    <button id="btnResetSettings" class="setting-btn reset">恢复默认</button>
  </div>
  <div id="settingsOverlay" class="settings-overlay"></div>

  <script src="app.js"></script>
</body>
</html>
